<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnSoft Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: #0d1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero { text-align: center; color: white; }
  .hero p { margin-top: 10px; color: rgba(255,255,255,0.6); font-size: 1rem; }

  #chat-toggle {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: black;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(245,166,35,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }

  #chat-toggle:hover { transform: scale(1.1); box-shadow: 0 8px 32px rgba(245,166,35,0.8); }
  #chat-toggle img { width: 68px; height: 68px; object-fit: cover; border-radius: 50%; }

  .badge {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 20px;
    height: 20px;
    background: #ef4444;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #toggle-wrapper { position: fixed; bottom: 24px; right: 24px; z-index: 999; }

  #chat-window {
    position: fixed;
    bottom: 100px;
    right: 24px;
    width: 370px;
    height: 560px;
    background: #ffffff;
    border-radius: 20px;
    display: none;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    z-index: 998;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #chat-window.open { display: flex; }

  .chat-header {
    background: linear-gradient(135deg, #F5A623, #e8920f);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: black;
    overflow: hidden;
    padding: 0;
    flex-shrink: 0;
  }

  .avatar img { width: 100%; height: 100%; object-fit: contain; }
  .header-info .name { font-weight: 600; font-size: 0.95rem; color: white; }
  .header-info .status { font-size: 0.72rem; opacity: 0.9; margin-top: 2px; }

  #close-chat {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  #close-chat:hover { background: rgba(255,255,255,0.35); }

  #chatbox {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f8f8fb;
  }

  #chatbox::-webkit-scrollbar { width: 4px; }
  #chatbox::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  .message { display: flex; align-items: flex-end; gap: 8px; }
  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    overflow: hidden;
    background: black;
  }

  .msg-avatar img { width: 100%; height: 100%; object-fit: contain; }
  .message.user .msg-avatar { background: #e0e0e0; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    max-width: 82%;
    font-size: 0.855rem;
    line-height: 1.6;
  }

  .user .bubble {
    background: linear-gradient(135deg, #F5A623, #e8920f);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .bot .bubble {
    background: #ffffff;
    color: #222;
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    align-items: center;
  }

  .typing-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #F5A623;
    animation: bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Option buttons inside chat */
  .option-btn {
    background: white;
    border: 1.5px solid #F5A623;
    color: #F5A623;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 0.76rem;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: all 0.15s;
    margin: 3px 2px;
  }

  .option-btn:hover { background: #F5A623; color: white; }

  .back-btn {
    border-color: #ccc;
    color: #999;
  }

  .back-btn:hover { background: #eee; color: #555; }

  .chips-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 4px 16px 8px;
    background: white;
    border-top: 1px solid #eee;
  }

  .chip {
    background: white;
    border: 1.5px solid #F5A623;
    color: #F5A623;
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 0.76rem;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-block;
  }

  .chip:hover { background: #F5A623; color: white; }

  .input-area {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    gap: 8px;
    border-top: 1px solid #eee;
    background: white;
    flex-shrink: 0;
  }

  #message-input {
    flex: 1;
    padding: 10px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 25px;
    font-family: 'Sora', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
    background: #f8f8fb;
  }

  #message-input:focus { border-color: #F5A623; background: white; }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #F5A623, #e8920f);
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s;
    box-shadow: 0 3px 12px rgba(245,166,35,0.4);
  }

  .send-btn:hover { transform: scale(1.08); }

  .powered-by {
    text-align: center;
    padding: 5px;
    background: white;
    font-size: 0.68rem;
    color: #999;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    border-top: 1px solid #eee;
    flex-shrink: 0;
  }

  .powered-by img { height: 14px; object-fit: contain; }
  .powered-by span { color: #F5A623; font-weight: 600; }
</style>
</head>

<body>
<div class="hero">
  <img src="/static/logo.webp" style="width:180px; margin-bottom:10px;">
  <p>500K+ Professionals Trained · 200+ IT Courses</p>
</div>

<div id="toggle-wrapper">
  <button id="chat-toggle">
    <img src="/static/logo.webp">
  </button>
  <div class="badge" id="notif-badge">🔔</div>
</div>

<div id="chat-window">
  <div class="chat-header">
    <div class="avatar">
      <img src="/static/logo.webp">
    </div>
    <div class="header-info">
      <div class="name">LearnSoft Assistant</div>
      <div class="status">🟢 Online · Replies instantly</div>
    </div>
    <button id="close-chat">✕</button>
  </div>

  <div id="chatbox"></div>

  <div class="chips-row">
    <a href="https://www.learnsoft.org/contact" target="_blank" class="chip">📞 Contact Us</a>
    <button class="chip" onclick="startNewChat()">🎓 Explore Courses</button>
  </div>

  <div class="input-area">
    <input type="text" id="message-input" placeholder="Type your name / phone / email..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>

  <div class="powered-by">
    Powered by
    <img src="/static/opseazy.png" alt="Opseazy">
    <span>Opseazy</span>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
